name = "orbit360"
main = "src/index.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Static dashboard (served for any non-/api route)
[assets]
directory = "./public"
binding = "ASSETS"

# Cache + history store. Create with:  wrangler kv namespace create ORBIT_KV
# then paste the id it prints below.
[[kv_namespaces]]
binding = "ORBIT_KV"
id = "<your-kv-namespace-id>"

# Native email alerts (free). Requires Email Routing enabled on the domain and
# the destination address verified in the Cloudflare dashboard.
[[send_email]]
name = "SEND_EMAIL"
destination_address = "you@example.com"

# Optional AI briefing (OFF by default). Uncomment to let the cron write a
# 2-3 sentence "what changed since yesterday" narrative with Cloudflare Workers
# AI — native, no API key, generous free allotment. The deterministic briefing
# works with or without this; the AI only ever rewrites the computed facts.
# [ai]
# binding = "AI"

# Poll + alert every 10 minutes.
[triggers]
crons = ["*/10 * * * *"]

[vars]
# ALERT_FROM must be on a domain you control on Cloudflare.
# ALERT_TO must equal the verified destination address above.
ALERT_FROM = "orbit360@example.com"
ALERT_TO = "you@example.com"

# NOTE: FINNHUB_API_KEY is a SECRET — never put it here. Set it with:
#   wrangler secret put FINNHUB_API_KEY
# TWELVEDATA_API_KEY (global tickers) is added the same way when you're ready.
